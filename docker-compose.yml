services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    volumes:
      - ./:/var/www/html
  
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${NGINX_PORT_MAPPING:-8080:80}"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.gear.loadbalancer.server.port=80"
      - "traefik.http.routers.gear.rule=Host(`${TRAEFIK_HOSTNAME:-localhost}`)"
      - "traefik.http.routers.gear.entrypoints=websecure"
      - "traefik.http.routers.gear.tls.certresolver=le"
      - "traefik.http.routers.gear-http.rule=Host(`${TRAEFIK_HOSTNAME:-localhost}`)"
      - "traefik.http.routers.gear-http.entrypoints=web"
      - "traefik.http.routers.gear-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  node:
    image: node:20.10.0-alpine
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    environment:
      VITE_DEV_SERVER_HOST: "0.0.0.0"
      VITE_DEV_SERVER_PORT: "5173"
      VITE_HMR_HOST: "localhost"
      VITE_USE_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "200"
    entrypoint: ["sh", "-lc"]
    command: ["npm install && npm run build && npm run dev -- --host 0.0.0.0 --port 5173"]

  traefik:
    image: traefik:v3.5
    profiles: ["vps"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${TRAEFIK_EMAIL:-change-me@example.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
  traefik-letsencrypt:
